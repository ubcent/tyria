services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: edgelink
      POSTGRES_USER: edgelink
      POSTGRES_PASSWORD: edgelink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Edge.link Proxy Service
  edge-proxy:
    build: .
    ports:
      - "8080:8080"  # Proxy server
      - "9090:9090"  # Metrics server
    volumes:
      - ./examples/config.yaml:/config.yaml:ro  # Mount example config
    environment:
      - LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    restart: unless-stopped
    depends_on:
      - postgres
      - jaeger

  # Admin API (Go backend)
  admin-api:
    build: 
      context: .
      dockerfile: Dockerfile.admin-api
    ports:
      - "3001:3001"  # Admin API
    environment:
      - POSTGRES_URL=postgresql://edgelink:edgelink@postgres:5432/edgelink?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    restart: unless-stopped
    depends_on:
      - postgres
      - jaeger

  # Admin UI (Next.js frontend)
  admin-ui:
    build: ./admin-ui
    ports:
      - "3000:3000"  # Admin UI
    environment:
      - ADMIN_API_URL=http://localhost:3001
    restart: unless-stopped
    depends_on:
      - admin-api

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # Tempo - Alternative distributed tracing backend
  tempo:
    image: grafana/tempo:2.6.0
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4319:4318"   # OTLP HTTP receiver (alternative port)
    restart: unless-stopped

  # Grafana - Observability dashboards
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3002:3000"   # Grafana UI (port 3001 used by admin-api)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - tempo
      - loki

  # Loki - Log aggregation
  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"   # Loki HTTP
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  # Promtail - Log collector for Loki
  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped
    depends_on:
      - loki

volumes:
  postgres_data:
  grafana_data:
  tempo_data:
  loki_data: