version: '3.8'

services:
  edge-proxy:
    build: .
    ports:
      - "8080:8080"  # Proxy server
      - "9090:9090"  # Metrics server
    volumes:
      - ./config.yaml:/root/config.yaml:ro  # Mount custom config if needed
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

