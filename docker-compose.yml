version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: edgelink
      POSTGRES_USER: edgelink
      POSTGRES_PASSWORD: edgelink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./admin-ui/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Edge.link Proxy Service
  edge-proxy:
    build: .
    ports:
      - "8080:8080"  # Proxy server
      - "9090:9090"  # Metrics server
    volumes:
      - ./config.yaml:/root/config.yaml:ro  # Mount custom config if needed
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres

  # Admin UI
  admin-ui:
    build: ./admin-ui
    ports:
      - "3000:3000"  # Admin UI
    environment:
      - POSTGRES_URL=postgresql://edgelink:edgelink@postgres:5432/edgelink
      - NEXTAUTH_SECRET=your-secret-key-here
      - NEXTAUTH_URL=http://localhost:3000
      - PROXY_API_URL=http://edge-proxy:8080
    restart: unless-stopped
    depends_on:
      - postgres
      - edge-proxy

  # Optional: Add a monitoring dashboard
  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   restart: unless-stopped

volumes:
  postgres_data:
  # grafana-data: