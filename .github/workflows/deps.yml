name: Dependency Updates

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  go-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.x'

    - name: Update Go dependencies
      run: |
        go get -u ./...
        go mod tidy

    - name: Run tests after update
      run: ./test-ci.sh

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update Go dependencies'
        title: 'chore(deps): update Go dependencies'
        body: |
          Automated dependency update for Go modules.
          
          This PR updates all Go dependencies to their latest versions.
          Please review the changes and test thoroughly before merging.
        branch: chore/update-go-deps
        delete-branch: true

  npm-dependencies:
    name: Update npm Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: admin-ui/package-lock.json

    - name: Install dependencies
      working-directory: ./admin-ui
      run: npm ci

    - name: Update npm dependencies
      working-directory: ./admin-ui
      run: |
        npm update
        npm audit fix --force || true

    - name: Test build after update
      working-directory: ./admin-ui
      run: |
        npm run build
        npm run lint

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update npm dependencies'
        title: 'chore(deps): update npm dependencies'
        body: |
          Automated dependency update for npm packages.
          
          This PR updates all npm dependencies to their latest versions.
          Please review the changes and test thoroughly before merging.
        branch: chore/update-npm-deps
        delete-branch: true